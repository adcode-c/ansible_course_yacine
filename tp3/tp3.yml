---
# Playbook pour configurer un serveur web
- name: Installation Apache 
  hosts: all 
  remote_user: root 
  gather_facts: yes  # Required to collect ansible_* facts 
  
  vars:
    document_root: "/var/www/html"


  tasks:
    - name: Gather the package facts
      ansible.builtin.package_facts:
        manager: auto
    
   # - name: Print the package facts
   #   ansible.builtin.debug:
   #    var: ansible_facts.packages


    - name: Show default IPv4 address
      debug:
        msg: "The IP address of {{ inventory_hostname }} is {{ ansible_facts['ansible_default_ipv4'] }}"

    - name: test
      debug:
        var: ansible_all_ipv4_addresses

    - name: Installer/desinstaller apache2 mysql 
      apt:
        update_cache: yes
        name: "{{ item }}"
        state: present
      loop:
        - apache2
        - mysql-server 
      when: ansible_facts["ansible_default_ipv4.address"] == "10.0.0.104"   # ansible_default_ipv4.address 
    
    - name: Check whether a package called apche2 is installed and copy the content 
      copy:
        content: "<h1>Bienvenue sur le serveur web</h1>"
        dest: "{{ document_root }}/index.html" 
      when: "'apache2' in ansible_facts.packages"
